name: UI Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libdbus-glib-1-2 libxtst6 libxrandr2 libasound2t64 libpangocairo-1.0-0 libatk1.0-0 libcairo-gobject2 libgtk-3-0 libgdk-pixbuf2.0-0

    - name: Install Playwright browsers
      run: playwright install

    - name: Check website accessibility
      run: |
        echo "🔍 Checking website accessibility..."
        echo "🌐 Testing connection to https://jumper.exchange/"
        if curl -f -s --max-time 10 https://jumper.exchange/ > /dev/null 2>&1; then
          echo "✅ Website is accessible"
        else
          echo "⚠️  Website not accessible, but continuing with tests..."
        fi
        echo "📊 Website accessibility check completed"

    - name: Run pytest tests (${{ matrix.browser }})
      run: |
        echo "🚀 Starting pytest for ${{ matrix.browser }} (all tests)..."
        set -e
        pytest --browser ${{ matrix.browser }} --html=reports/report-${{ matrix.browser }}.html --self-contained-html -v -s --tb=short --maxfail=1
        echo "✅ Pytest completed successfully for ${{ matrix.browser }}"

    - name: Upload test results (${{ matrix.browser }})
      uses: actions/upload-artifact@v4
      if: always()
      continue-on-error: true
      with:
        name: test-results-${{ matrix.browser }}
        path: reports/
        retention-days: 30

    - name: Test completion summary
      if: always()
      run: |
        echo "🎉 Test execution completed for ${{ matrix.browser }}"
        echo "📊 Test results uploaded as: test-results-${{ matrix.browser }}"
        echo "📄 HTML report available at: reports/report-${{ matrix.browser }}.html"
