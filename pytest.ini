[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
    -p pytest_playwright
    --video=retain-on-failure
    --screenshot=only-on-failure
    --output=reports
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests